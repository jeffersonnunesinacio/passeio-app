<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
    <h2 class="text-2x1 font-semibold text-amber-700 mb-4"> Nova Categoria </h2>

    <hr class="border-amber-700">

    <form id="categoriaForm" [formGroup]="camposForm" (ngSubmit)="salvar()">
        <div class="mb-4 mt-4">
            <label class="block text-gray-600 font-medium mb-2">Nome</label>
            <input type="text" 
                   id="nome" 
                   name="nome"
                   formControlName="nome" 
                   placeholder="Ex. Restaurantes, Praias, Shoppings"
                   class="w-full p-3 border border-amber-300 rounded shadow-sm focus:outline-none focus:ring-0 focus:border-amber-600"
                   required >
            <span class="text-red-800 text-sm" *ngIf="isCampoInvalido('nome')">Campo Obrigatório</span>
        </div>

        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Descrição</label>
            <textarea
                   rows="4" 
                   id="descricao" 
                   name="descricao" 
                   formControlName="descricao"
                   placeholder="Ex. Restaurantes, Praias, Shoppings"
                   class="w-full p-3 border border-amber-300 rounded shadow-sm focus:outline-none focus:ring-0 focus:border-amber-600"
                   required>
            </textarea>
            <span class="text-red-800 text-sm" *ngIf="isCampoInvalido('descricao')">Campo Obrigatório</span>
        </div>

        <button type="submit" class="w-full bg-amber-600 text-white font-semibold p-3 rounded shadow hover:bg-amber-700">
            Cadastrar Categoria
        </button>
    </form>
</div>
